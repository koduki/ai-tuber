volumes:
  voice_share:
  recordings:
  voicevox_data:
  ai_tuber_data:


services:
  # --- Saint Graph (Spirit/Logic) ---
  saint-graph:
    build:
      context: .
      dockerfile: src/saint_graph/Dockerfile
    environment:
      - RUN_MODE=desktop
      - BODY_URL=http://body-streamer:8000
      - WEATHER_MCP_URL=http://tools-weather:8001/sse
      - STREAMING_MODE=${STREAMING_MODE:-false}
      - PYTHONPATH=/app/src
      - NO_PROXY=body-streamer,tools-weather,localhost,127.0.0.1
      - STORAGE_TYPE=filesystem
      - SECRET_PROVIDER_TYPE=env
      - CHARACTER_NAME=${CHARACTER_NAME:-ren}
    volumes:
      - ai_tuber_data:/app/data
    env_file: .env
    depends_on:
      body-streamer:
        condition: service_healthy
      tools-weather:
        condition: service_healthy
    command: python -m saint_graph.main

  # --- Tools Weather (MCP Server) ---
  tools-weather:
    build:
      context: .
      dockerfile: src/tools/weather/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - PORT=8001
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 5s
      timeout: 2s
      retries: 5

  # --- Body CLI (REST Server / For Development) ---
  body-cli:
    build:
      context: .
      dockerfile: src/body/cli/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    stdin_open: true
    tty: true
    environment:
      - PORT=8000
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 5s
      timeout: 2s
      retries: 5

  # --- Body Streamer (REST Server for Streaming) ---
  body-streamer:
    build:
      context: .
      dockerfile: src/body/streamer/Dockerfile
    ports:
      - "8002:8000"
    env_file: .env
    stdin_open: true
    tty: true
    volumes:
      - voice_share:/app/shared/voice
      - ai_tuber_data:/app/data
    environment:
      - PORT=8000
      - VOICEVOX_HOST=voicevox
      - VOICEVOX_PORT=50021
      - OBS_HOST=obs-studio
      - OBS_PORT=4455
      - OBS_PASSWORD=${OBS_PASSWORD:-}
      - STREAMING_MODE=${STREAMING_MODE:-false}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
      - YOUTUBE_LIVE_CHAT_ID=${YOUTUBE_LIVE_CHAT_ID:-}
      - YOUTUBE_POLLING_INTERVAL=5
      - YOUTUBE_CLIENT_SECRET_PATH=${YOUTUBE_CLIENT_SECRET_PATH:-/secret/google_client_secret.json}
      - YOUTUBE_TOKEN_PATH=${YOUTUBE_TOKEN_PATH:-/secret/yt_token.json}
      - YOUTUBE_CLIENT_SECRET_JSON=${YOUTUBE_CLIENT_SECRET_JSON:-}
      - YOUTUBE_TOKEN_JSON=${YOUTUBE_TOKEN_JSON:-}
    depends_on:
      voicevox:
        condition: service_healthy
      obs-studio:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 5s
      timeout: 2s
      retries: 5

  # --- VoiceVox Engine ---
  voicevox:
    image: voicevox/voicevox_engine:nvidia-ubuntu20.04-latest
    env_file: .env
    ports:
      - "50021:50021"
    volumes:
      - ${VOICEVOX_DATA_DIR:-./data/mind/${CHARACTER_NAME:-ren}}:/mnt/voicevox-config:ro
      - voicevox_data:/home/user/.local/share/voicevox-engine-dev
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        cp -rf /mnt/voicevox-config/* /home/user/.local/share/voicevox-engine-dev/ 2>/dev/null
        chown -R user:user /home/user/.local/share/voicevox-engine-dev
        cat /opt/voicevox_engine/README.md
        exec gosu user /opt/python/bin/python3 ./run.py --use_gpu --voicelib_dir /opt/voicevox_core/ --runtime_dir /opt/onnxruntime/lib --host 0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--output-document=/dev/null", "http://localhost:50021/version" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- OBS Studio (Streaming/Broadcasting) ---
  obs-studio:
    build:
      context: .
      dockerfile: src/body/streamer/obs/Dockerfile
    env_file: .env
    ports:
      - "8080:8080" # noVNC web interface
      - "4455:4455" # OBS WebSocket
    volumes:
      - voice_share:/app/shared/voice
      - ai_tuber_data:/app/data
      - ./data:/mnt/host-data:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        cp -rf /mnt/host-data/* /app/data/ 2>/dev/null
        chown -R root:root /app/data
        exec /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf
    environment:
      - DISPLAY=:99
      - STORAGE_TYPE=filesystem
      - CHARACTER_NAME=${CHARACTER_NAME:-ren}
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME:-}
    shm_size: '2gb'

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu, video, graphics, utility, display ]
