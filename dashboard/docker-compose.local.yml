services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-ren-studio-ai}
      - GCP_REGION=${GCP_REGION:-asia-northeast1}
      - GCP_ZONE=${GCP_ZONE:-asia-northeast1-a}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-creds.json
    volumes:
      # ホスト側の作業ディレクトリに一時的にコピーした ADC ファイルをマウント
      - ./gcp-creds.json:/app/gcp-creds.json
    # 起動時に認証が有効であることを前提とする
    # (gcloud auth application-default login 済みであること)
